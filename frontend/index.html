  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      }
      // PWA install prompt — shows a small "Install" button in the page footer
      // PWA install prompt stored silently — no floating button
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        // Expose to app via global so components can trigger install if needed
        window.__pwaInstall = () => { if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; } };
      });
    </script>
  </body>
