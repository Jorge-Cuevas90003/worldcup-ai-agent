<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0e18" />
    <meta name="description" content="Live FIFA World Cup 2026 odds tracker with AI alerts. Powered by Polymarket + Auth0 Token Vault.">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- Open Graph -->
    <meta property="og:title" content="WorldCup Agent — Live World Cup 2026 Odds">
    <meta property="og:description" content="Track FIFA World Cup 2026 betting odds in real-time from Polymarket. AI-powered alerts via Auth0 Token Vault.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://worldcup-agent.vercel.app">
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="WorldCup Agent">
    <meta name="twitter:description" content="Live World Cup 2026 odds from Polymarket">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg">
    <link rel="manifest" href="/manifest.json">
    <title>WorldCup Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Oswald:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      }
      // PWA install prompt — shows a small "Install" button in the page footer
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        const btn = document.createElement('button');
        btn.textContent = 'Install App';
        btn.setAttribute('aria-label', 'Install WorldCup Agent as an app');
        Object.assign(btn.style, {
          position: 'fixed', bottom: '80px', left: '50%', transform: 'translateX(-50%)',
          zIndex: '9999', padding: '8px 16px', border: 'none', borderRadius: '20px',
          background: 'rgba(201,169,78,0.9)', color: '#0a0e18', fontWeight: '600',
          fontSize: '12px', cursor: 'pointer', boxShadow: '0 4px 16px rgba(0,0,0,.3)',
          backdropFilter: 'blur(8px)', opacity: '0.85'
        });
        document.body.appendChild(btn);
        btn.addEventListener('click', () => {
          deferredPrompt.prompt();
          deferredPrompt.userChoice.then(() => { btn.remove(); deferredPrompt = null; });
        });
      });
    </script>
  </body>
</html>
